<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <title>Todo App</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    input { padding: 8px; width: 70%; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 16px; background: #0066cc; color: #fff; border: none; border-radius: 4px; cursor: pointer; margin-left: 4px; }
    li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>
  <h1>Todo App</h1>
  <div>
    <input id="title" placeholder="New todo..."/>
    <button onclick="addTodo()">Add</button>
  </div>
  <ul id="list"></ul>
  <script>
    const API = 'http://todo-app-alb-1714007384.us-west-2.elb.amazonaws.com';
    async function load() {
      try {
        const res = await fetch(API + '/todos');
        const todos = await res.json();
        document.getElementById('list').innerHTML = todos.map(t =>
          `<li><span style="text-decoration:${t.done?'line-through':''}">${t.title}</span>
           <div>
             <button onclick="toggle(${t.id},${!t.done})">${t.done?'Undo':'Done'}</button>
             <button onclick="del(${t.id})">Delete</button>
           </div></li>`
        ).join('');
      } catch(e) {
        console.error('Load error:', e);
      }
    }
    async function addTodo() {
      const title = document.getElementById('title').value;
      if (!title) return;
      try {
        await fetch(API + '/todos', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({title})
        });
        document.getElementById('title').value = '';
        load();
      } catch(e) {
        console.error('Add error:', e);
      }
    }
    async function toggle(id, done) {
      await fetch(API + '/todos/' + id, {
        method:'PATCH',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({done})
      });
      load();
    }
    async function del(id) {
      await fetch(API + '/todos/' + id, { method:'DELETE' });
      load();
    }
    load();
  </script>
</body>
</html>
